<meta charset="utf-8">
<style>html,body{margin:0;background:#16161b;font-family:sans-serif;color:#ddd}
canvas{width:700px;height:96px;display:block}
.row{display:flex;align-items:center;gap:10px;padding:2px 8px}
.lbl{width:230px;font-size:12px;white-space:nowrap}</style>
<div id="wrap"></div>
<script src="../parsers/osuParser.js"></script>
<script src="../app/taikoSpreadView.js"></script>
<script>
var t = 'osu file format v14\n\n[Difficulty]\nSliderMultiplier:1.4\nSliderTickRate:1\n\n'
 + '[TimingPoints]\n0,500,4,1,0,100,1,0\n\n[HitObjects]\n'
 + '1,1,1000,2,0,L|300:192,1,700\n'     // 通常連打
 + '1,1,3200,2,4,L|300:192,1,700\n';    // Finisher連打（太い）
var d = { name:'', fileName:'a.osu', notes: window.parseTaikoNotes(t),
          red: window.parseTaikoRedTiming(t), barlines: [], marks: window.parseTaikoTimelineMarks(t) };
var CANDIDATES = [
  ['A 現在（濃い茶）',        'rgba(80,52,0,0.85)'],
  ['B 深いアンバー',          'rgba(168,112,0,0.95)'],
  ['C 落ち着いた琥珀（薄め）', 'rgba(140,95,0,0.55)'],
  ['D 白・低不透明度',        'rgba(255,255,255,0.45)'],
  ['E 暖色のオレンジ茶',      'rgba(190,120,10,0.9)'],
  ['F 黒・低不透明度',        'rgba(0,0,0,0.28)']
];
var wrap = document.getElementById('wrap');
CANDIDATES.forEach(function(c, i){
  var row = document.createElement('div'); row.className = 'row';
  var lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = c[0] + '  ' + c[1];
  var cv = document.createElement('canvas'); cv.id = 'c' + i;
  row.appendChild(lbl); row.appendChild(cv); wrap.appendChild(row);
});
window.renderAll = function(){
  CANDIDATES.forEach(function(c, i){
    window.TAIKO_COLORS.rollTick = c[1];
    window.drawTaikoSpread(document.getElementById('c' + i), [d], 1350, { pxPerMs:0.6, snap:4 });
  });
  return CANDIDATES.length;
};
</script>
