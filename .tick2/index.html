<meta charset="utf-8">
<style>html,body{margin:0;background:#16161b}canvas{width:900px;height:150px;display:block}</style>
<canvas id="c"></canvas>
<script src="../parsers/osuParser.js"></script>
<script src="../app/taikoSpreadView.js"></script>
<script>
var t = 'osu file format v14\n\n[Difficulty]\nSliderMultiplier:1.4\nSliderTickRate:1\n\n'
 + '[TimingPoints]\n0,500,4,1,0,100,1,0\n\n[HitObjects]\n'
 + '1,1,1000,2,0,L|300:192,1,700\n'      // 通常連打
 + '1,1,2600,1,0\n1,1,2800,1,8\n'        // ドン・カツ（色の比較用）
 + '1,1,3200,2,4,L|300:192,1,700\n';     // Finisher連打
var mk = function(n){ return { name:n, fileName:n+'.osu', notes: window.parseTaikoNotes(t),
   red: window.parseTaikoRedTiming(t), barlines: [], marks: window.parseTaikoTimelineMarks(t) }; };
window.render = function(){
  window.drawTaikoSpread(document.getElementById('c'), [mk('通常'), mk('Finisher')], 2400,
    { pxPerMs:0.30, snap:4 });
  return 1;
};
</script>
